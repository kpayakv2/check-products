# pytest.ini
[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (no external deps)
    integration: Integration tests (no external deps)
    performance: Performance and load tests
    ui: UI and browser tests
    slow: Slow running tests (>5s)
    live: Tests requiring live API server (http://localhost:8000)
    db: Tests requiring live Supabase/database connection
    offline: Tests that run without any external service
addopts = -m "not live and not db"
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
