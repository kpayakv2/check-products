version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      # Connect to Supabase via Host Bridge (Win32)
      - SUPABASE_URL=http://host.docker.internal:54331
      - SUPABASE_ANON_KEY=sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: [ "python", "-m", "uvicorn", "api_server:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]

  frontend:
    build:
      context: ./taxonomy-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_URL=http://host.docker.internal:54331
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

# Note: Supabase Local is managed separately via 'supabase start' on port 54331
